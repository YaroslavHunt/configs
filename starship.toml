"$schema" = 'https://starship.rs/config-schema.json'

# ═══════════════════════════════════════════════════════════════════════════════
#  Palette : Catppuccin Mocha
#  Layout  : two-line, conditional modules, right-aligned time
#  Symbols : Nerd Font glyphs (all preserved from the official preset)
# ═══════════════════════════════════════════════════════════════════════════════

# ───── Global settings ────────────────────────────────────────────────────────
add_newline = true
palette     = "catppuccin_mocha"

# ───── Prompt layout ──────────────────────────────────────────────────────────
format = """\
$username\
$hostname\
$directory\
$git_branch$git_state$git_status$git_metrics\
$package\
$nodejs$bun$deno$python$rust$golang$java\
$docker_context$kubernetes$terraform$aws$gcloud\
$sudo$status$character"""

right_format = """$cmd_duration"""


# ═══════════════════════════════════════════════════════════════════════════════
#  COLOR PALETTE  —  Catppuccin Mocha
#  ─────────────────────────────────────────────────────────────────────────────
#  Swap palette by changing the `palette =` field above and adding a new
#  [palettes.<name>] table below. Suggested alternatives:
#      tokyo_night, gruvbox_dark, nord, dracula, rose_pine
# ═══════════════════════════════════════════════════════════════════════════════

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"


# ═══════════════════════════════════════════════════════════════════════════════
#  CORE  —  prompt character, identity, working directory
# ═══════════════════════════════════════════════════════════════════════════════

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[username]
show_always = false                  # show only when root or in SSH
style_user  = "bold lavender"
style_root  = "bold red"
format      = "[$user]($style)"

[hostname]
ssh_only   = true                    # show only in SSH session
ssh_symbol = "  "
style      = "bold green dimmed"
format     = "[@$hostname$ssh_symbol]($style) "

[directory]
style              = "bold lavender"
read_only          = " 󰌾"
read_only_style    = "red"
truncation_length  = 3
truncation_symbol  = "…/"
truncate_to_repo   = true
home_symbol        = "~"
format             = "[$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"Documents" = "󰈙 Documents"
"Downloads" = "󰉍 Downloads"
"Music"     = "󰝚 Music"
"Pictures"  = "󰉏 Pictures"
"Projects"  = "󰲋 Projects"
"Developer" = "󰲋 Developer"
"workspace" = "󰲋 workspace"


# ═══════════════════════════════════════════════════════════════════════════════
#  VERSION CONTROL  —  Git, Mercurial, Fossil, Pijul
# ═══════════════════════════════════════════════════════════════════════════════

[git_branch]
symbol = " "
style  = "bold mauve"
format = "[on](text) [$symbol$branch]($style) "

[git_status]
style      = "bold yellow"
format     = '([\[$all_status$ahead_behind\]]($style) )'
ahead      = "⇡${count}"
diverged   = "⇡${ahead_count}⇣${behind_count}"
behind     = "⇣${count}"
modified   = "!${count}"
staged     = "+${count}"
untracked  = "?${count}"
deleted    = "✘${count}"
stashed    = "≡"
renamed    = "»${count}"
conflicted = "${count}"

[git_state]
format       = '\([$state( $progress_current/$progress_total)]($style)\) '
style        = "bold red"
rebase       = "REBASING"
merge        = "MERGING"
revert       = "REVERTING"
cherry_pick  = "CHERRY-PICKING"
bisect       = "BISECTING"
am           = "AM"
am_or_rebase = "AM/REBASE"

[git_metrics]
disabled            = false
added_style         = "bold green"
deleted_style       = "bold red"
format              = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
only_nonzero_diffs  = true

[git_commit]
tag_symbol   = "  "
tag_disabled = false

[hg_branch]
symbol = " "

[fossil_branch]
symbol = " "

[pijul_channel]
symbol = " "


# ═══════════════════════════════════════════════════════════════════════════════
#  RUNTIMES & LANGUAGES
#  Modules auto-detect via project files (package.json, Cargo.toml, etc.)
#  All symbols are Nerd Font glyphs preserved from the official preset.
# ═══════════════════════════════════════════════════════════════════════════════

# ───── JavaScript / TypeScript runtimes ───────────────────────────────────────
[nodejs]
symbol            = "󰎙"
style             = "bold green"
format            = "[$symbol ($version )]($style)"
detect_files      = ["package.json", ".nvmrc", ".node-version"]
detect_folders    = ["node_modules"]
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]

[bun]
symbol = " "
style  = "bold peach"
format = "[via](text) [$symbol($version )]($style)"

[deno]
symbol = " "
style  = "bold teal"
format = "[via](text) [$symbol($version )]($style)"

# ───── Primary backend languages ──────────────────────────────────────────────
[python]
symbol = " "
style  = "bold yellow"
format = '[via](text) [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[rust]
symbol = "󱘗 "
style  = "bold red"
format = "[via](text) [$symbol($version )]($style)"

[golang]
symbol = " "
style  = "bold sky"
format = "[via](text) [$symbol($version )]($style)"

[java]
symbol = " "
style  = "bold red"
format = "[via](text) [$symbol($version )]($style)"

[kotlin]
symbol = " "

[scala]
symbol = " "

[ruby]
symbol = " "

[php]
symbol = " "

[perl]
