# ═══════════════════════════════════════════════════════════════════════════════
#  CLOUD PROVIDERS
# ═══════════════════════════════════════════════════════════════════════════════

[aws]
symbol   = "󰸏 "
style    = "bold peach"
disabled = true
# AWS region/profile auto-detect from ~/.aws/config triggers this module
# even without env vars set. Keep disabled by default to avoid noise.
# To enable temporarily for AWS-heavy work: starship explain
# or flip `disabled = false` here.
format   = '[on](text) [$symbol($profile )(\($region\) )]($style)'

[aws.region_aliases]
eu-west-1      = "dub"
eu-west-2      = "lon"
eu-central-1   = "fra"
us-east-1      = "iad"
us-east-2      = "cmh"
us-west-2      = "pdx"
ap-southeast-1 = "sin"
ap-northeast-1 = "nrt"

[aws.profile_aliases]
default = ""

[gcloud]
symbol   = "󱇶 "
style    = "bold blue"
disabled = true                      # enable when working with GCP
format   = '[on](text) [$symbol$account(@$domain)(\($region\))]($style) '

[azure]
symbol   = " "
disabled = true

[openstack]
symbol = " "


# ═══════════════════════════════════════════════════════════════════════════════
#  INFRASTRUCTURE & DEVOPS
# ═══════════════════════════════════════════════════════════════════════════════

[docker_context]
symbol          = " "
style           = "bold blue"
format          = "[via](text) [$symbol$context]($style) "
only_with_files = true
detect_files    = [
  "docker-compose.yml",
  "docker-compose.yaml",
  "compose.yml",
  "compose.yaml",
  "Dockerfile",
  ".dockerignore",
]

[kubernetes]
disabled       = false
symbol         = "󱃾 "
style          = "bold sapphire"
format         = '[on](text) [$symbol$context( \($namespace\))]($style) '
detect_files   = [
  "k8s.yaml",
  "kustomization.yaml",
  "Chart.yaml",
  "values.yaml",
  "helmfile.yaml",
  "skaffold.yaml",
]
detect_folders = ["k8s", "kubernetes", "helm", ".kube"]

[terraform]
symbol = "󱁢 "
style  = "bold mauve"
format = "[via](text) [$symbol$workspace]($style) "

[helm]
symbol = " "

[pulumi]
symbol = " "

[vagrant]
symbol = " "

[singularity]
symbol = " "

[container]
symbol = " "

[nix_shell]
symbol = " "

[guix_shell]
symbol = " "

[spack]
symbol = " "

[direnv]
symbol = " "

[nats]
symbol = " "

[netns]
symbol = "󰛳 "


# ═══════════════════════════════════════════════════════════════════════════════
#  STATUS & SIGNALS  —  error codes, timing, resource pressure
# ═══════════════════════════════════════════════════════════════════════════════

[cmd_duration]
min_time          = 2_000            # threshold in ms
format            = "[took $duration]($style)"
style             = "yellow"
show_milliseconds = false

[status]
disabled              = false
symbol                = "✗"
success_symbol        = ""
not_executable_symbol = "🚫"
not_found_symbol      = "🔍"
sigint_symbol         = "🧱"
signal_symbol         = "⚡"
format                = '[$symbol $common_meaning$signal_name$maybe_int]($style) '
style                 = "bold red"
recognize_signal_code = true
map_symbol            = true

[time]
disabled    = false
format      = '[$time]($style)'
style       = "overlay1"
time_format = "%H:%M"

[shlvl]
disabled  = false
symbol    = "󰹍 "
threshold = 2                        # show only inside nested shells
format    = '[$symbol$shlvl]($style) '
style     = "bold yellow"

[sudo]
disabled = false
symbol   = " "
format   = "[as $symbol]($style) "
style    = "bold red"

[memory_usage]
disabled  = false
symbol    = "󰍛 "
threshold = 75                       # show only when RAM > 75%
format    = "via [$symbol $ram]($style) "
style     = "bold red dimmed"

[battery]
disabled           = false
full_symbol        = "󰁹 "
charging_symbol    = "󰂄 "
discharging_symbol = "󰂃 "
unknown_symbol     = "󰂑 "
empty_symbol       = "󰂎 "

[[battery.display]]
threshold = 20
style     = "bold red"

[[battery.display]]
threshold = 50
style     = "bold yellow"


