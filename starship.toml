# ───── Build tools, package managers, frameworks ──────────────────────────────
[package]
symbol           = "󰏗 "
style            = "bold peach"
format           = "[is](text) [$symbol$version]($style) "
display_private  = false

[gradle]
symbol = " "

[maven]
symbol = " "

[cmake]
symbol = " "

[meson]
symbol = "󰔷 "

[xmake]
symbol = " "

[conda]
symbol = " "

[pixi]
