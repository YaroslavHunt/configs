"$schema" = 'https://starship.rs/config-schema.json'

# ═══════════════════════════════════════════════════════════════════════════════
#  Palette : Catppuccin Mocha
#  Layout  : single-line, conditional modules, right-aligned cmd duration
#  Symbols : Material Design Nerd Font glyphs (󰀀-󱿿 range) — render reliably
# ═══════════════════════════════════════════════════════════════════════════════

# ───── Global settings ────────────────────────────────────────────────────────
add_newline = true
palette     = "catppuccin_mocha"

# ───── Prompt layout ──────────────────────────────────────────────────────────
format = """\
$username\
$hostname\
$directory\
$git_branch$git_state$git_status$git_metrics\
$package\
$nodejs$bun$deno$python$rust$golang$java\
$docker_context$kubernetes$terraform$aws$gcloud\
$fill\
$cmd_duration\
$line_break\
$sudo$status$character"""


# ═══════════════════════════════════════════════════════════════════════════════
#  COLOR PALETTE  —  Catppuccin Mocha
#  ─────────────────────────────────────────────────────────────────────────────
#  Swap palette by changing the `palette =` field above and adding a new
#  [palettes.<name>] table below. Suggested alternatives:
#      tokyo_night, gruvbox_dark, nord, dracula, rose_pine
# ═══════════════════════════════════════════════════════════════════════════════

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"


# ═══════════════════════════════════════════════════════════════════════════════
#  CORE  —  prompt character, identity, working directory
# ═══════════════════════════════════════════════════════════════════════════════

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[username]
show_always = false                  # show only when root or in SSH
style_user  = "bold lavender"
style_root  = "bold red"
format      = "[$user]($style)"

[hostname]
ssh_only   = true                    # show only in SSH session
ssh_symbol = " 󰣀 "                    # MD ssh
style      = "bold green dimmed"
format     = "[@$hostname$ssh_symbol]($style) "

[directory]
style              = "bold lavender"
read_only          = " 󰌾"             # MD lock
read_only_style    = "red"
truncation_length  = 3
truncation_symbol  = ""
truncate_to_repo   = true
home_symbol        = "~"
format             = "[$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"Documents" = "󰈙 Documents"
"Downloads" = "󰉍 Downloads"
"Music"     = "󰝚 Music"
"Pictures"  = "󰉏 Pictures"
"Projects"  = "󰲋 Projects"
"Developer" = "󰲋 Developer"
"workspace" = "󰲋 workspace"


# ═══════════════════════════════════════════════════════════════════════════════
#  VERSION CONTROL  —  Git, Mercurial, Fossil, Pijul
# ═══════════════════════════════════════════════════════════════════════════════

[git_branch]
symbol = "󰘬 "                          # MD source-branch
style  = "bold mauve"
format = "[on](text) [$symbol$branch]($style) "

[git_status]
style      = "bold yellow"
format     = '([\[$all_status$ahead_behind\]]($style) )'
ahead      = "⇡${count}"
diverged   = "⇡${ahead_count}⇣${behind_count}"
behind     = "⇣${count}"
modified   = "!${count}"
staged     = "+${count}"
untracked  = "?${count}"
deleted    = "✘${count}"
stashed    = "≡"
renamed    = "»${count}"
conflicted = "${count}"

[git_state]
format       = '\([$state( $progress_current/$progress_total)]($style)\) '
style        = "bold red"
rebase       = "REBASING"
merge        = "MERGING"
revert       = "REVERTING"
cherry_pick  = "CHERRY-PICKING"
bisect       = "BISECTING"
am           = "AM"
am_or_rebase = "AM/REBASE"

[git_metrics]
disabled            = false
added_style         = "bold green"
deleted_style       = "bold red"
format              = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
only_nonzero_diffs  = true

[git_commit]
tag_symbol   = " 󰓹 "                   # MD tag
tag_disabled = false

[hg_branch]
symbol = "󰘬 "                          # reuse source-branch

[fossil_branch]
symbol = "󰘬 "

[pijul_channel]
symbol = "󰘬 "


# ═══════════════════════════════════════════════════════════════════════════════
#  RUNTIMES & LANGUAGES
#  Modules auto-detect via project files (package.json, Cargo.toml, etc.)
#  All symbols are Material Design Nerd Font glyphs.
# ═══════════════════════════════════════════════════════════════════════════════

# ───── JavaScript / TypeScript runtimes ───────────────────────────────────────
[nodejs]
symbol            = "󰎙 "               # MD nodejs
style             = "bold green"
format            = "[via](text) [$symbol($version )]($style)"
detect_files      = ["package.json", ".nvmrc", ".node-version"]
detect_folders    = ["node_modules"]
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]

[bun]
symbol = "󰟯 "                          # MD food-croissant (closest "bun")
style  = "bold peach"
format = "[via](text) [$symbol($version )]($style)"

[deno]
symbol = "󰣘 "                          # MD dinosaur
style  = "bold teal"
format = "[via](text) [$symbol($version )]($style)"

# ───── Primary backend languages ──────────────────────────────────────────────
[python]
symbol = "󰌠 "                          # MD language-python
style  = "bold yellow"
format = '[via](text) [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[rust]
symbol = "󱘗 "                          # MD language-rust
style  = "bold red"
format = "[via](text) [$symbol($version )]($style)"

[golang]
symbol = "󰟓 "                          # MD language-go
style  = "bold sky"
format = "[via](text) [$symbol($version )]($style)"

[java]
symbol = "󰬷 "                          # MD language-java
style  = "bold red"
format = "[via](text) [$symbol($version )]($style)"

[kotlin]
symbol = "󱈙 "                          # MD language-kotlin

[scala]
symbol = "󰈮 "                          # MD file-code (generic)

[ruby]
symbol = "󰴭 "                          # MD language-ruby

[php]
symbol = "󰌟 "                          # MD language-php

[perl]
symbol = "󰈮 "

[lua]
symbol = "󰢱 "                          # MD language-lua

[c]
symbol = "󰙱 "                          # MD language-c

[cpp]
symbol = "󰙲 "                          # MD language-cpp

[dotnet]
symbol = "󰪮 "                          # MD language-csharp

[swift]
symbol = "󰛥 "                          # MD language-swift

[dart]
symbol = "󰪥 "                          # MD dart

[elixir]
symbol = "󱂈 "                          # MD potion

[erlang]
symbol = "󰈮 "

[haskell]
symbol = "󰲒 "                          # MD language-haskell

[ocaml]
symbol = "󰈮 "

[crystal]
symbol = "󰮯 "

[julia]
symbol = "󰈮 "

[nim]
symbol = "󰈮 "

[zig]
symbol = "󰈮 "

# ───── Niche / emerging languages ─────────────────────────────────────────────
[elm]
symbol = "󰈮 "

[fennel]
symbol = "󰈮 "

[fortran]
symbol = "󰈮 "

[cobol]
symbol = "󰈮 "

[gleam]
symbol = "󰈮 "

[haxe]
symbol = "󰈮 "

[vlang]
symbol = "󰈮 "

[purescript]
symbol = "󰈮 "

[raku]
symbol = "󱖊 "                          # MD raku (preserved)

[red]
symbol = "󱍼 "                          # MD red (preserved)

[rlang]
symbol = "󰟔 "                          # MD R

[mojo]
symbol = "󰈸 "                          # MD fire

[odin]
symbol = "󰟢 "                          # MD owl

[opa]
symbol = "󰈮 "

[solidity]
symbol = "󰈮 "

[typst]
symbol = "󰈮 "

# ───── Build tools, package managers, frameworks ──────────────────────────────
[package]
symbol           = "󰏗 "                # MD package
style            = "bold peach"
format           = "[is](text) [$symbol$version]($style) "
display_private  = false

[gradle]
symbol = "󰈮 "

[maven]
symbol = "󰈮 "

[cmake]
symbol = "󰬢 "                          # MD construction-cone

[meson]
symbol = "󰔷 "                          # MD triangle-outline (preserved)

[xmake]
symbol = "󰈮 "

[conda]
symbol = "󱔎 "                          # MD snake

[pixi]
symbol = "󰏗 "                          # reuse package

[buf]
symbol = "󰈮 "


# ═══════════════════════════════════════════════════════════════════════════════
#  CLOUD PROVIDERS
# ═══════════════════════════════════════════════════════════════════════════════

[aws]
symbol   = "󰸏 "                        # MD aws
style    = "bold peach"
disabled = true
# AWS region/profile auto-detect from ~/.aws/config triggers this module
# even without env vars set. Keep disabled by default to avoid noise.
# To enable temporarily for AWS-heavy work: starship explain
# or flip `disabled = false` here.
format   = '[on](text) [$symbol($profile )(\($region\) )]($style)'

[aws.region_aliases]
eu-west-1      = "dub"
eu-west-2      = "lon"
eu-central-1   = "fra"
us-east-1      = "iad"
us-east-2      = "cmh"
us-west-2      = "pdx"
ap-southeast-1 = "sin"
ap-northeast-1 = "nrt"

[aws.profile_aliases]
default = ""

[gcloud]
symbol   = "󱇶 "                        # MD google-cloud
style    = "bold blue"
disabled = true                        # enable when working with GCP
format   = '[on](text) [$symbol$account(@$domain)(\($region\))]($style) '

[azure]
symbol   = "󰠅 "                        # MD microsoft-azure
disabled = true

[openstack]
symbol = "󰈮 "


# ═══════════════════════════════════════════════════════════════════════════════
#  INFRASTRUCTURE & DEVOPS
# ═══════════════════════════════════════════════════════════════════════════════

[docker_context]
symbol          = "󰡨 "                 # MD docker
style           = "bold blue"
format          = "[via](text) [$symbol$context]($style) "
only_with_files = true
detect_files    = [
  "docker-compose.yml",
  "docker-compose.yaml",
  "compose.yml",
  "compose.yaml",
  "Dockerfile",
  ".dockerignore",
]

[kubernetes]
disabled       = false
symbol         = "󱃾 "                  # MD kubernetes
style          = "bold sapphire"
format         = '[on](text) [$symbol$context( \($namespace\))]($style) '
detect_files   = [
  "k8s.yaml",
  "kustomization.yaml",
  "Chart.yaml",
  "values.yaml",
  "helmfile.yaml",
  "skaffold.yaml",
]
detect_folders = ["k8s", "kubernetes", "helm", ".kube"]

[terraform]
symbol = "󱁢 "                          # MD terraform
style  = "bold mauve"
format = "[via](text) [$symbol$workspace]($style) "

[helm]
symbol = "󰠳 "                          # MD ship-wheel

[pulumi]
symbol = "󰈮 "

[vagrant]
symbol = "󰈮 "

[singularity]
symbol = "󰈮 "

[container]
symbol = "󰡨 "                          # reuse docker

[nix_shell]
symbol = "󱄅 "                          # MD nix

[guix_shell]
symbol = "󰈮 "

[spack]
symbol = "󰈮 "

[direnv]
symbol = "󰈮 "

[nats]
symbol = "󰈮 "

[netns]
symbol = "󰛳 "                          # MD network


# ═══════════════════════════════════════════════════════════════════════════════
#  STATUS & SIGNALS  —  error codes, timing, resource pressure
# ═══════════════════════════════════════════════════════════════════════════════

[cmd_duration]
min_time          = 500
format            = "[$duration]($style)"
style             = "overlay1"
show_milliseconds = true

[fill]
symbol = " "

[status]
disabled              = false
symbol                = "󰅙 "
success_symbol        = ""
not_executable_symbol = "󰂭 "
not_found_symbol      = "󰍉 "
sigint_symbol         = "󰜺 "
signal_symbol         = "󱐋 "
format                = '[$symbol$common_meaning$signal_name$maybe_int]($style) '
style                 = "bold red"
recognize_signal_code = true
map_symbol            = true

[time]
disabled    = false                    # currently not in $format — kept for easy re-enable
format      = '[$time]($style)'
style       = "overlay1"
time_format = "%H:%M"

[shlvl]
disabled  = false
symbol    = "󰹍 "                       # MD shell-level
threshold = 2                          # show only inside nested shells
format    = '[$symbol$shlvl]($style) '
style     = "bold yellow"

[sudo]
disabled = false
symbol   = "󰒃 "                        # MD shield-key
format   = "[as $symbol]($style) "
style    = "bold red"

[memory_usage]
disabled  = false
symbol    = "󰍛 "                       # MD memory
threshold = 75                         # show only when RAM > 75%
format    = "via [$symbol $ram]($style) "
style     = "bold red dimmed"

[battery]
disabled           = false
full_symbol        = "󰁹 "              # MD battery
charging_symbol    = "󰂄 "              # MD battery-charging
discharging_symbol = "󰂃 "              # MD battery-alert
unknown_symbol     = "󰂑 "              # MD battery-unknown
empty_symbol       = "󰂎 "              # MD battery-outline

[[battery.display]]
threshold = 20
style     = "bold red"

[[battery.display]]
threshold = 50
style     = "bold yellow"


# ═══════════════════════════════════════════════════════════════════════════════
#  OPERATING SYSTEM
#  Set [os].disabled = false to show an OS glyph at the start of the prompt.
#  Then add `$os` to `format` above. MD glyphs where available; many distros
